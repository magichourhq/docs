name: Update Changelog

on:
  schedule:
    # Run weekly on Monday at 3 AM UTC
    - cron: "0 3 * * 1"
  workflow_dispatch: # Allow manual trigger
    inputs:
      since:
        description: "Override start date (YYYY-MM-DD). Leave blank to auto-detect from changelog.mdx."
        required: false
        type: string
      until:
        description: "Override end date (YYYY-MM-DD, inclusive). Leave blank for no end bound."
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  update-changelog:
    runs-on: blacksmith-2vcpu-ubuntu-2404

    steps:
      # App token so the opened PR can trigger CI (GITHUB_TOKEN cannot).
      # Repo var: APP_CLIENT_ID; secret: APP_PRIVATE_KEY
      # App needs Contents: write + Pull requests: write on this repo.
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "yarn"

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Capture current changelog head date
        id: before
        run: |
          label=$(grep -oE 'label="[0-9]{4}-[0-9]{2}-[0-9]{2}"' changelog.mdx | head -1 | sed 's/label="//;s/"//')
          echo "label=$label" >> "$GITHUB_OUTPUT"

      - name: Generate changelog entries
        env:
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
          LINEAR_TEAM_ID: ${{ secrets.LINEAR_TEAM_ID }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          yarn changelog --skip-select --yes \
            ${{ github.event.inputs.since && format('--since {0}', github.event.inputs.since) || '' }} \
            ${{ github.event.inputs.until && format('--until {0}', github.event.inputs.until) || '' }}

      - name: Format with Prettier
        run: yarn prettier --write changelog.mdx

      - name: Resolve changelog date range
        id: range
        run: |
          prev="${{ steps.before.outputs.label }}"
          dates=$(
            grep -oE 'label="[0-9]{4}-[0-9]{2}-[0-9]{2}"' changelog.mdx \
              | sed 's/label="//;s/"//' \
              | awk -v prev="$prev" '$0 == prev { exit } { print }' \
              | sort
          )
          if [ -z "$dates" ]; then
            start="${{ github.event.inputs.since }}"
            end="${{ github.event.inputs.until }}"
          else
            start=$(echo "$dates" | head -1)
            end=$(echo "$dates" | tail -1)
          fi
          echo "start=$start" >> "$GITHUB_OUTPUT"
          echo "end=$end" >> "$GITHUB_OUTPUT"
          echo "PR date range: $start → $end"

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ steps.app-token.outputs.token }}
          commit-message: "feat: add changelog for ${{ steps.range.outputs.start }} to ${{ steps.range.outputs.end }}"
          title: "feat: add changelog for ${{ steps.range.outputs.start }} to ${{ steps.range.outputs.end }}"
          body: |
            ## Summary
            - Add changelog entries from ${{ steps.range.outputs.start }} to ${{ steps.range.outputs.end }}
          branch: update-changelog
          delete-branch: true
